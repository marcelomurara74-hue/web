<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        header{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:20px;
        }

        nav{
            background:#333;
            padding:10px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:0 15px;
            font-weight:bold;
        }

        nav a:hover{
            color:#0d6efd;
        }

        .container{
            width:80%;
            margin:30px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .btn{
            background:#0d6efd;
            color:white;
            padding:10px 20px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .btn:hover{
            background:#0b5ed7;
        }

        footer{
            background:#333;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:30px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Meu Site</h1>
        <p>Página criada em HTML e CSS</p>
    </header>

    <nav>
        <a href="#">Início</a>
        <a href="#">Sobre</a>
        <a href="#">Serviços</a>
        <a href="#">Contato</a>
    </nav>

    <div class="container">
        <h2>Bem-vindo!</h2>
        <p>Este é um exemplo de página HTML moderna e responsiva.</p>
        <br>
        <button class="btn">Clique Aqui</button>
    </div>

    <footer>
        <p>&copy; 2026 - Todos os direitos reservados.</p>
    </footer>

</body>
</html>
