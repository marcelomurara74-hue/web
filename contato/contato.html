<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página de Contato</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:#fff;
    width:90%;
    max-width:500px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#777;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#444;
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    transition:.3s;
}

input:focus,
textarea:focus{
    border-color:#4f46e5;
    outline:none;
    box-shadow:0 0 8px rgba(79,70,229,.3);
}

textarea{
    resize:none;
}

button{
    width:100%;
    padding:14px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#3730a3;
}

.contato{
    margin-top:25px;
    text-align:center;
    color:#555;
}

.contato p{
    margin:8px 0;
}
</style>

</head>
<body>

<div class="container">

<h1>Entre em Contato</h1>

<p>Preencha o formulário abaixo.</p>

<form>

<div class="form-group">
<label>Nome</label>
<input type="text" placeholder="Digite seu nome" required>
</div>

<div class="form-group">
<label>E-mail</label>
<input type="email" placeholder="Digite seu e-mail" required>
</div>

<div class="form-group">
<label>Telefone</label>
<input type="tel" placeholder="(00) 00000-0000">
</div>

<div class="form-group">
<label>Mensagem</label>
<textarea rows="5" placeholder="Digite sua mensagem"></textarea>
</div>

<button type="submit">Enviar Mensagem</button>

</form>

<div class="contato">
    <h3>Informações</h3>
    <p>📍 Rua Exemplo, 123 - Centro</p>
    <p>📞 (47) 99999-9999</p>
    <p>✉ contato@empresa.com.br</p>
</div>

</div>

</body>
</html>
